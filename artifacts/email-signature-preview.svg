
<svg width="1400" height="1000" viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#0f1923" flood-opacity="0.10"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f1923" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1400" height="1000" fill="#f7f5f2"/>
  <rect x="120" y="82" width="1160" height="836" rx="24" fill="#ffffff" stroke="#e2ddd6" filter="url(#shadow)"/>

  <text x="178" y="164" fill="#c4622d" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="3">KEMORA SIGNATURE PREVIEW</text>
  <text x="178" y="218" fill="#0f1923" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800">Email signature direction</text>
  <text x="178" y="262" fill="#6b6460" font-family="Arial, Helvetica, sans-serif" font-size="21">Logo on the left, contact details on the right, separated by a fine line.</text>
  <text x="178" y="292" fill="#6b6460" font-family="Arial, Helvetica, sans-serif" font-size="21">Compact enough for email, but still clearly branded.</text>

  <text x="178" y="370" fill="#6b6460" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="2">RECOMMENDED LAYOUT</text>

  <rect x="178" y="400" width="820" height="230" rx="18" fill="#ffffff" stroke="#e2ddd6" filter="url(#soft)"/>
  <image x="242" y="464" width="80" height="84" href="data:image/png;base64,"/>
  <text x="228" y="582" fill="#0f1923" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" letter-spacing="3">KEMORA</text>
  <line x1="370" y1="438" x2="370" y2="592" stroke="#e2ddd6" stroke-width="2"/>

  <text x="416" y="466" fill="#0f1923" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="800">[Name]</text>
  <text x="416" y="500" fill="#c4622d" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Co-Founder &amp; [Role]</text>
  <text x="416" y="548" fill="#0f1923" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700">Kemora - Private Label Manufacturing &amp; Export</text>
  <text x="416" y="586" fill="#6b6460" font-family="Arial, Helvetica, sans-serif" font-size="17">Location: [City], Poland / Egypt   |   Email: hello@kemoratex.com   |   Web: kemoratex.com</text>

  <rect x="178" y="682" width="320" height="126" rx="16" fill="#f5f1eb" stroke="#e2ddd6"/>
  <text x="204" y="728" fill="#0f1923" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">Logo placement</text>
  <text x="204" y="762" fill="#6b6460" font-family="Arial, Helvetica, sans-serif" font-size="17">Use the mark on the left.</text>
  <text x="204" y="788" fill="#6b6460" font-family="Arial, Helvetica, sans-serif" font-size="17">Keep it around 52-60px.</text>

  <rect x="540" y="682" width="320" height="126" rx="16" fill="#f5f1eb" stroke="#e2ddd6"/>
  <text x="566" y="728" fill="#0f1923" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">Text hierarchy</text>
  <text x="566" y="762" fill="#6b6460" font-family="Arial, Helvetica, sans-serif" font-size="17">Name first, then role,</text>
  <text x="566" y="788" fill="#6b6460" font-family="Arial, Helvetica, sans-serif" font-size="17">then company/contact info.</text>

  <rect x="902" y="682" width="320" height="126" rx="16" fill="#f5f1eb" stroke="#e2ddd6"/>
  <text x="928" y="728" fill="#0f1923" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">Email-safe</text>
  <text x="928" y="762" fill="#6b6460" font-family="Arial, Helvetica, sans-serif" font-size="17">A table layout is easiest</text>
  <text x="928" y="788" fill="#6b6460" font-family="Arial, Helvetica, sans-serif" font-size="17">to copy into email clients.</text>

  <rect x="178" y="850" width="1044" height="18" rx="9" fill="#0f1923" opacity="0.10"/>
</svg>